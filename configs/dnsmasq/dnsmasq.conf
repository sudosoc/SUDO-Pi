# SUDO-Pi dnsmasq configuration — DHCP for wlan0 AP clients
# This file is managed by SUDO-Pi. Manual edits may be overwritten.

# Only listen on the AP interface, not wlan1 or lo
interface=wlan0
bind-interfaces
except-interface=lo

# DHCP range: 192.168.4.100 – 192.168.4.200, 24h lease
dhcp-range=192.168.4.100,192.168.4.200,255.255.255.0,24h

# Gateway and DNS point at the Pi itself
dhcp-option=3,192.168.4.1
dhcp-option=6,192.168.4.1

# Log DHCP activity for the connected-devices panel
log-dhcp
log-facility=/var/log/dnsmasq.log

# Lease file path (read by SUDO-Pi to list AP clients)
dhcp-leasefile=/var/lib/misc/dnsmasq.leases

# Forward DNS upstream via wlan1 internet connection
# These are overridden at runtime if wlan1 gets its own DNS via DHCP
server=8.8.8.8
server=1.1.1.1

# Do not read /etc/resolv.conf (we set nameservers explicitly above)
no-resolv

# Cache size for DNS
cache-size=1000
