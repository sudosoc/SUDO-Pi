# SUDO-Pi hostapd configuration for wlan0 (management AP)
# This file is managed by SUDO-Pi. Manual edits may be overwritten.

interface=wlan0
driver=nl80211
ssid=SUDO-Pi
hw_mode=g
channel=6
country_code=US
ieee80211n=1
wmm_enabled=1

# WPA2 Personal
wpa=2
wpa_passphrase=sudopi2024
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# AP isolation (clients cannot talk to each other)
ap_isolate=0

# Max clients
max_num_sta=10

# Don't hide SSID
ignore_broadcast_ssid=0

# Logging
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2
